server {
    listen 80;
    client_max_body_size 10M;
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /rabbit/ {
        set $rabbit_upstream http://rabbitmq:15672;
        proxy_pass $rabbit_upstream;
        proxy_set_header Host $host;
    }

    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
    }

    location /prometheus/ {
        set $prometheus_upstream http://prometheus:9090;
        rewrite ^/prometheus(/.*)$ $1 break;
        proxy_pass $prometheus_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /loki/ {
        set $loki_upstream http://loki:3100;
        rewrite ^/loki(/.*)$ $1 break;
        proxy_pass $loki_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /docs {
        set $docs_upstream http://api:8000;
        proxy_pass $docs_upstream/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        set $openapi_upstream http://api:8000;
        proxy_pass $openapi_upstream/openapi.json;
        proxy_set_header Host $host;
    }

    location /grafana {
        set $grafana_upstream http://grafana:3000;
        proxy_pass $grafana_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /storage {
        set $minio_upstream http://minio:9001;
        proxy_pass $minio_upstream;
        proxy_set_header Host $host;
    }

    location /voice/ {
        proxy_pass http://voice:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
    }

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }
}
