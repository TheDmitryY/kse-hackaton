services:
  voice:
    build:
      context: ./src/voice
      dockerfile: Dockerfile
    image: kse-voice:latest
    container_name: kse_voice
    restart: unless-stopped
    ports:
      - "${VOICE_PORT:-8001}:8001"
    expose:
      - "${VOICE_PORT:-8001}"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - voice_audio:/tmp/voice_audio
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${VOICE_PORT:-8001}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - kse

networks:
  kse:
    driver: bridge

volumes:
  voice_audio:
