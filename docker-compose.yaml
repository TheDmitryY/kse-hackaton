services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kse-api:latest
    container_name: kse_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${API_PORT:-3001}:3001"
    expose:
      - "${API_PORT:-3001}"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - kse

  nginx:
    image: nginx:alpine
    container_name: kse_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - frontend_build:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      api:
        condition: service_started
    networks:
      - kse

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-}
    image: kse-frontend-builder:latest
    container_name: kse_frontend
    restart: "no"
    volumes:
      - frontend_build:/output
    networks:
      - kse

  voice:
    build:
      context: ./src/voice
      dockerfile: Dockerfile
    image: kse-voice:latest
    container_name: kse_voice
    restart: unless-stopped
    ports:
      - "${VOICE_PORT:-8001}:8001"
    expose:
      - "${VOICE_PORT:-8001}"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - voice_audio:/tmp/voice_audio
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${VOICE_PORT:-8001}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - kse

  database:
    image: postgres:16
    restart: always
    env_file:
      - .env
    expose:
      - "${POSTGRES_PORT:-5432}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - kse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  kse:
    driver: bridge

volumes:
  voice_audio:
  frontend_build:
